
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trello Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f0f2f5;--white:#fff;--border:#e2e6ed;
    --accent:#0052cc;--accent-light:#e8f0fe;
    --success-light:#e3fcef;--danger-light:#ffebe6;
    --text:#172b4d;--muted:#6b778c;
    --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);font-family:var(--font);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
  header{background:var(--white);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
  .avatar{width:38px;height:38px;background:linear-gradient(135deg,#0052cc,#0065ff);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
  .header-info{flex:1}.header-name{font-weight:600;font-size:0.95rem}
  .header-sub{font-size:0.72rem;color:var(--muted);display:flex;align-items:center;gap:5px}
  .dot{width:6px;height:6px;border-radius:50%;background:#36b37e}
  .ctx-bar{background:var(--white);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0}
  .chip{display:flex;align-items:center;gap:6px;background:#f8f9fb;border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:0.75rem;cursor:pointer;transition:all 0.15s;color:var(--muted)}
  .chip:hover,.chip.active{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
  .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
  .message{display:flex;gap:10px;max-width:80%;animation:fadeUp 0.2s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .message.user{align-self:flex-end;flex-direction:row-reverse}
  .msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:2px}
  .msg-av.ai{background:linear-gradient(135deg,#0052cc,#0065ff)}
  .msg-av.user{background:#dfe1e6}
  .msg-wrap{display:flex;flex-direction:column}
  .bubble{padding:10px 14px;border-radius:16px;font-size:0.87rem;line-height:1.55}
  .message.ai .bubble{background:var(--white);border:1px solid var(--border);border-top-left-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,0.06)}
  .message.user .bubble{background:#0052cc;color:#fff;border-top-right-radius:4px}
  .time{font-size:0.63rem;color:var(--muted);margin-top:3px;padding:0 4px}
  .message.user .time{text-align:right}
  .typing{display:flex;gap:4px;align-items:center;padding:4px 0}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite}
  .typing span:nth-child(2){animation-delay:0.2s}.typing span:nth-child(3){animation-delay:0.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
  .rcard{border-radius:10px;padding:10px 14px;margin-top:8px;font-size:0.82rem}
  .rcard.ok{background:var(--success-light);border:1px solid #abf5d1}
  .rcard.err{background:var(--danger-light);border:1px solid #ffbdad}
  .rcard b{display:block;margin-bottom:4px}
  .rcard span{color:var(--muted);font-family:var(--mono);font-size:0.73rem}
  .input-area{background:var(--white);border-top:1px solid var(--border);padding:14px 20px;display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
  .input-wrap{flex:1;background:#f8f9fb;border:1.5px solid var(--border);border-radius:14px;display:flex;align-items:flex-end;padding:8px 14px;transition:border-color 0.15s}
  .input-wrap:focus-within{border-color:#0052cc;background:#fff}
  textarea{flex:1;border:none;background:transparent;font-family:var(--font);font-size:0.9rem;color:var(--text);resize:none;max-height:120px;outline:none;line-height:1.5}
  textarea::placeholder{color:var(--muted)}
  .send{width:38px;height:38px;border-radius:10px;background:#0052cc;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.15s;flex-shrink:0;color:#fff}
  .send:hover{background:#0065ff}
  .send:disabled{background:var(--border);cursor:not-allowed}
  strong{font-weight:600}
  .messages::-webkit-scrollbar{width:4px}.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>
<header>
  <div class="avatar">📋</div>
  <div class="header-info">
    <div class="header-name">Assistente Trello</div>
    <div class="header-sub"><span class="dot"></span><span id="status">Clique em Carregar</span></div>
  </div>
  <button class="chip" onclick="loadBoards()" style="margin-left:auto">🔄 Carregar</button>
</header>
<div class="ctx-bar" id="ctxBar"><span style="font-size:0.78rem;color:var(--muted)">Carregue os boards para começar</span></div>
<div class="messages" id="msgs"></div>
<div class="input-area">
  <div class="input-wrap">
    <textarea id="inp" rows="1" placeholder="Ex: Cria uma tarefa pra ligar pro João..." onkeydown="handleKey(event)" oninput="resize(this)"></textarea>
  </div>
  <button class="send" id="sendBtn" onclick="send()">➤</button>
</div>
<script>
const BASE='https://trello-backend-y94k.onrender.com';
let ctx={boards:[],board:null,lists:[]};
function now(){return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function addMsg(role,text,card=null){
  const m=document.getElementById('msgs');
  const d=document.createElement('div');d.className=`message ${role}`;
  const av=document.createElement('div');av.className=`msg-av ${role}`;av.textContent=role==='ai'?'🤖':'👤';
  const w=document.createElement('div');w.className='msg-wrap';
  const b=document.createElement('div');b.className='bubble';
  b.innerHTML=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  if(card)b.appendChild(card);
  const t=document.createElement('div');t.className='time';t.textContent=now();
  w.appendChild(b);w.appendChild(t);d.appendChild(av);d.appendChild(w);m.appendChild(d);
  m.scrollTop=m.scrollHeight;
}
function typing(){
  const m=document.getElementById('msgs');
  const d=document.createElement('div');d.className='message ai';d.id='typing';
  d.innerHTML=`<div class="msg-av ai">🤖</div><div class="msg-wrap"><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
  m.appendChild(d);m.scrollTop=m.scrollHeight;
}
function rmTyping(){document.getElementById('typing')?.remove();}
async function api(path,method='GET',body=null){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(BASE+path,opts);
  return await r.json();
}
async function loadBoards(){
  document.getElementById('status').textContent='Carregando...';
  try{
    const data=await api('/boards');
    if(!Array.isArray(data))throw new Error(JSON.stringify(data));
    ctx.boards=data;renderCtx();
    document.getElementById('status').textContent=`${data.length} board(s)`;
    addMsg('ai',`✅ Boards carregados!\n${data.map(b=>`• **${b.name}**`).join('\n')}\n\nClique num board acima para selecionar!`);
  }catch(e){
    document.getElementById('status').textContent='Erro';
    addMsg('ai',`❌ Erro: ${e.message}`);
  }
}
function renderCtx(){
  const bar=document.getElementById('ctxBar');bar.innerHTML='';
  ctx.boards.forEach(b=>{
    const c=document.createElement('div');c.className='chip'+(ctx.board?.id===b.id?' active':'');
    c.textContent=b.name;c.onclick=()=>selectBoard(b);bar.appendChild(c);
  });
}
async function selectBoard(b){
  ctx.board=b;ctx.lists=[];renderCtx();
  document.getElementById('status').textContent=`Board: ${b.name}`;
  try{
    const data=await api(`/boards/${b.id}/lists`);
    ctx.lists=data;
    addMsg('ai',`📌 **${b.name}** selecionado!\nListas: ${data.map(l=>l.name).join(', ')}\n\nAgora me diga o que criar!`);
  }catch(e){addMsg('ai',`Erro ao carregar listas: ${e.message}`);}
}
async function createCard(name,listName,desc=''){
  let listId=ctx.lists[0]?.id;
  if(listName){const match=ctx.lists.find(l=>l.name.toLowerCase().includes(listName.toLowerCase()));if(match)listId=match.id;}
  if(!listId){addMsg('ai','❌ Selecione um board primeiro!');return;}
  const data=await api('/cards','POST',{name,idList:listId,desc});
  if(data.id){
    const card=document.createElement('div');card.className='rcard ok';
    card.innerHTML=`<b>✅ Tarefa criada!</b><span>📝 ${data.name}</span>`;
    addMsg('ai','Feito!',card);
  }else{
    const card=document.createElement('div');card.className='rcard err';
    card.innerHTML=`<b>❌ Erro</b><span>${JSON.stringify(data)}</span>`;
    addMsg('ai','Não consegui criar.',card);
  }
}
async function send(){
  const inp=document.getElementById('inp');
  const text=inp.value.trim();if(!text)return;
  inp.value='';resize(inp);
  document.getElementById('sendBtn').disabled=true;
  addMsg('user',text);typing();
  const lower=text.toLowerCase();
  if(lower.includes('board')||lower.includes('carreg')||lower.includes('lista')){
    rmTyping();
    if(ctx.boards.length===0){await loadBoards();}
    else{addMsg('ai',`Boards:\n${ctx.boards.map(b=>`• **${b.name}**`).join('\n')}`);}
    document.getElementById('sendBtn').disabled=false;return;
  }
  if(lower.includes('cria')||lower.includes('adiciona')||lower.includes('nova')||lower.includes('card')){
    rmTyping();
    let name=text.replace(/cria(r)?( uma?)?( tarefa)?( de)?/i,'').replace(/adiciona(r)?( uma?)?/i,'').trim();
    if(!name)name=text;
    await createCard(name,null,'');
    document.getElementById('sendBtn').disabled=false;return;
  }
  rmTyping();
  addMsg('ai','Para criar uma tarefa diga:\n**"Cria: [nome da tarefa]"**\n\nPara ver boards: **"Mostra os boards"**');
  document.getElementById('sendBtn').disabled=false;
}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}
function resize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
window.onload=()=>{addMsg('ai','Olá! 👋 Sou seu assistente do **Trello**.\n\nClique em **🔄 Carregar** para começar!');};
</script>
</body>
</html>
